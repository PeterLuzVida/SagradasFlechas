<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peter Novassat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #14141c;
    --card-hover: #1a1a24;
    --text: #f5f5f7;
    --muted: #8a8a96;
    --gold: #d4af37;
    --gold-soft: #e8c870;
    --yt-red: #FF0000;
    --spotify-green: #1DB954;
    --border: rgba(255,255,255,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  /* Animated blobs */
  .blobs {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.35;
    animation: float 18s ease-in-out infinite;
  }
  .blob.warm {
    width: 340px; height: 340px;
    background: radial-gradient(circle, #FF0000, transparent 70%);
    top: -80px; left: -100px;
  }
  .blob.blue {
    width: 380px; height: 380px;
    background: radial-gradient(circle, #cc0000, transparent 70%);
    bottom: -120px; right: -120px;
    animation-delay: -9s;
  }
  @keyframes float {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px, 40px) scale(1.1); }
  }
  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 48px 24px 64px;
  }
  /* Profile */
  .profile {
    text-align: center;
    margin-bottom: 36px;
  }
  .avatar-ring {
    width: 112px; height: 112px;
    margin: 0 auto 18px;
    border-radius: 50%;
    padding: 3px;
    background: conic-gradient(from 180deg, var(--gold), var(--gold-soft), #fff3c4, var(--gold), var(--gold-soft));
    box-shadow: 0 8px 30px rgba(212,175,55,0.25);
  }
  .avatar-ring img {
    width: 100%; height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--bg);
    display: block;
  }
  .name {
    font-family: 'Sora', sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .tagline {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.5;
    max-width: 320px;
    margin: 0 auto;
  }
  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 28px 0 24px;
  }
  .divider .line {
    height: 1px;
    flex: 1;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }
  .diamond {
    width: 7px; height: 7px;
    background: var(--gold);
    transform: rotate(45deg);
    box-shadow: 0 0 8px rgba(212,175,55,0.6);
  }
  /* Links */
  .links {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .link-card {
    position: relative;
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 18px;
    text-decoration: none;
    color: var(--text);
    overflow: hidden;
    transition: transform 0.3s cubic-bezier(.2,.8,.2,1), box-shadow 0.3s, background 0.3s, border-color 0.3s;
  }
  .link-card:hover {
    transform: translateY(-3px);
    background: var(--card-hover);
  }
  /* Diagonal YouTube corner */
  .yt-corner {
    position: absolute;
    top: 0; right: 0;
    width: 64px; height: 64px;
    overflow: hidden;
    pointer-events: none;
  }
  .yt-corner::before {
    content: "";
    position: absolute;
    top: -32px; right: -32px;
    width: 90px; height: 90px;
    background: var(--yt-red);
    transform: rotate(45deg);
    opacity: 0.55;
    transition: opacity 0.3s, box-shadow 0.3s;
  }
  .yt-corner span {
    position: absolute;
    top: 9px; right: 4px;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #fff;
    transform: rotate(45deg);
    text-transform: uppercase;
    opacity: 0.9;
  }
  .link-card.yt:hover .yt-corner::before {
    opacity: 0.95;
    box-shadow: 0 0 24px rgba(255,0,0,0.55);
  }
  /* Icon */
  .link-icon {
    flex-shrink: 0;
    width: 46px; height: 46px;
    border-radius: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }
  .link-icon svg { width: 22px; height: 22px; }
  .yt .link-icon {
    background: var(--yt-red);
    box-shadow: 0 4px 14px rgba(255,0,0,0.3);
  }
  .link-body {
    flex: 1;
    min-width: 0;
    position: relative;
    z-index: 1;
  }
  .link-title {
    font-family: 'Sora', sans-serif;
    font-weight: 600;
    font-size: 15.5px;
    letter-spacing: -0.01em;
    margin-bottom: 2px;
  }
  .link-subtitle {
    color: var(--muted);
    font-size: 12.5px;
    font-weight: 500;
  }
  .badge {
    position: absolute;
    top: 12px; left: 12px;
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 6px;
    z-index: 2;
  }
  .badge.featured {
    background: rgba(255,0,0,0.15);
    color: #ff6b6b;
    border: 1px solid rgba(255,0,0,0.3);
  }
  .badge.soon {
    background: rgba(29,185,84,0.15);
    color: #4fd98a;
    border: 1px solid rgba(29,185,84,0.3);
  }
  .arrow {
    flex-shrink: 0;
    color: var(--muted);
    transition: transform 0.3s, color 0.3s;
    position: relative;
    z-index: 1;
  }
  .link-card:hover .arrow {
    transform: translateX(4px);
    color: var(--text);
  }
  /* Featured card */
  .link-card.featured {
    background: linear-gradient(180deg, #1a1212, var(--card));
    border-color: rgba(255,0,0,0.25);
    box-shadow: 0 8px 30px rgba(255,0,0,0.12);
  }
  .link-card.featured:hover {
    box-shadow: 0 14px 40px rgba(255,0,0,0.22);
    border-color: rgba(255,0,0,0.4);
  }
  .link-card.featured .yt-corner::before {
    opacity: 0.75;
  }
  /* Spotify / disabled */
  .link-card.spotify {
    background: #101410;
    border-color: rgba(29,185,84,0.18);
    opacity: 0.78;
    cursor: not-allowed;
  }
  .link-card.spotify:hover {
    transform: none;
    background: #101410;
  }
  .link-card.spotify .link-icon {
    background: var(--spotify-green);
    box-shadow: 0 4px 14px rgba(29,185,84,0.25);
  }
  .link-card.spotify .arrow { color: rgba(29,185,84,0.5); }
  /* Footer */
  .footer {
    text-align: center;
    margin-top: 40px;
    color: var(--muted);
    font-size: 12.5px;
    line-height: 1.6;
    font-style: italic;
    opacity: 0.8;
  }
  .footer .heart { color: var(--gold); font-style: normal; }
</style>
</head>
<body>
  <div class="blobs">
    <div class="blob warm"></div>
    <div class="blob blue"></div>
  </div>
  <main class="container">
    <section class="profile">
      <div class="avatar-ring">
        <img src="profile.jpg" alt="Peter Novassat">
      </div>
      <h1 class="name">Peter Novassat</h1>
      <p class="tagline">Projetos católicos, música gerada por IA e canções que tocam a alma.</p>
    </section>
    <div class="divider">
      <div class="line"></div>
      <div class="diamond"></div>
      <div class="line"></div>
    </div>
    <section class="links">
      <a href="#" class="link-card yt featured">
        <span class="badge featured">Destaque</span>
        <div class="yt-corner"><span>YouTube</span></div>
        <div class="link-icon">
          <svg viewBox="0 0 24 24" fill="white"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        </div>
        <div class="link-body">
          <div class="link-title">Sagradas Flechas</div>
          <div class="link-subtitle">YouTube</div>
        </div>
        <svg class="arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </a>
      <a href="#" class="link-card yt">
        <div class="yt-corner"><span>YouTube</span></div>
        <div class="link-icon">
          <svg viewBox="0 0 24 24" fill="white"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        </div>
        <div class="link-body">
          <div class="link-title">Catholic AI Music</div>
          <div class="link-subtitle">YouTube</div>
        </div>
        <svg class="arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </a>
      <div class="link-card spotify">
        <span class="badge soon">Em breve</span>
        <div class="link-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12h2M6 8v8M10 5v14M14 8v8M18 11v2M22 12h0"/>
          </svg>
        </div>
        <div class="link-body">
          <div class="link-title">Spotify</div>
          <div class="link-subtitle">Plataforma de streaming</div>
        </div>
        <svg class="arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </section>
    <footer class="footer">
      "Tudo posso naquele que me fortalece." <span class="heart">✦</span><br>
      Que a música seja ponte entre o céu e o coração.
    </footer>
  </main>
</body>
</html>
